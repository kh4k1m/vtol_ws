flight_config:
  # 1. Источник данных (Среда)
  # "real"     - Работа с реальным дроном (камера: USB /dev/video* или сеть RTSP, + автопилот)
  # "gazebo"   - Работа с симулятором (Gazebo камера, SITL)
  # "from_log" - Воспроизведение из логов (камера и телеметрия идут из rosbag/mp4)
  environment: "real"

  # 2. Алгоритм навигации
  # "tags" - Полет по AprilTag маркерам (включает автоматический взлет и посадку)
  # "dpvo" - Полет по визуальной одометрии DPVO (публикует позу и пишет CSV лог)
  # "none" - Только сбор данных (камера + mavros), без запуска алгоритмов навигации
  navigation: "dpvo"

  # Настройки подключения к автопилоту (MAVLink Bridge - для управления)
  real_connection: "/dev/ttyACM1"
  gazebo_connection: "tcp:127.0.0.1:5762"
  log_connection: "tcp:127.0.0.1:5762" # SITL для прогона логов

  # Настройки подключения MAVROS (для чтения телеметрии IMU/GPS в логгер)
  # ВНИМАНИЕ: Если на реальном дроне порт /dev/ttyACM0 занят, используйте MAVProxy 
  # для раздачи телеметрии по UDP (например, udp://127.0.0.1:14550@)
  mavros_real_connection: "udp://127.0.0.1:14550@"
  mavros_gazebo_connection: "udp://127.0.0.1:14550@14555"

  # Камера в режиме real: USB (UVC) — путь V4L2, например /dev/video0; при сетевом стриме — rtsp://...
  real_video_source: "/dev/video0"
  gazebo_camera_topic: "/world/runway/model/alti_transition_quad/link/down_camera_link/sensor/down_camera_sensor/image"
  gazebo_camera_info_topic: "/world/runway/model/alti_transition_quad/link/down_camera_link/sensor/down_camera_sensor/camera_info"
