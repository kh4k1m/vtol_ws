# Настройки словаря меток
#
# ВАЖНО: поле ``size`` — это длина ВНЕШНЕГО квадрата метки в метрах (та же
# величина, что подаётся в solvePnP в ``tag_detector_node``). Ошибка хотя бы
# в ~2× сразу даёт ~2× ошибку по дальности/высоте от PnP. После полёта
# можно оценить поправку: ``python visual_positioning_demo.py analyze-session
# logs/session_<…>`` (регрессия ``/ap/relative_alt`` vs ``tag_z``).
#
# Для SITL значения должны совпадать с размерами моделей в Gazebo.
dictionary: "DICT_APRILTAG_36h11"

# Якорная метка (к ней привязаны GPS координаты)
anchor_id: 0
anchor_gps:
  lat: 65.988106
  lon: 117.622628

# Размеры меток (в метрах)
# Для ROS-пайплайна все размеры задаются через config.
# Для SITL значения здесь должны совпадать с размерами в Gazebo.
default_marker_size: 0.3

# Список известных меток и их физические размеры
markers:
  - id: 0
    size: 0.05
  - id: 1
    size: 0.05
  - id: 2
    size: 0.05
  - id: 3
    size: 0.05
  - id: 4
    size: 0.05
  - id: 5
    size: 0.3
  - id: 6
    size: 0.3
  - id: 7
    size: 0.3
  - id: 8
    size: 0.3
  - id: 9
    size: 0.3
  - id: 10
    size: 1.5
  - id: 11
    size: 1.5
  - id: 12
    size: 1.5
  - id: 13
    size: 1.5
  - id: 14
    size: 1.5
  - id: 15
    size: 1.5
  - id: 16
    size: 1.5
  - id: 17
    size: 1.5
  - id: 18
    size: 1.5
  - id: 19
    size: 1.5
